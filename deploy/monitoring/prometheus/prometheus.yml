global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot backend (Micrometer)
  # backend 컨테이너는 같은 네트워크의 서비스명 'backend' 로 접근.
  # nginx 는 /api/ 만 프록시하므로 actuator 는 외부 비공개, 내부망에서만 scrape.
  - job_name: 'whiskeynote-backend'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: whiskeynote

  # test RDS backend (backend-test 컨테이너 — run-backend-test.sh start 후 scrape)
  - job_name: 'whiskeynote-backend-test'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend-test:8080']
        labels:
          application: whiskeynote-test
