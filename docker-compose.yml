# 로컬 Phase A 검증용 (MySQL 컨테이너 포함).
# EC2 배포 시: .env 를 RDS 로 바꾸고 mysql 서비스 제거, image 를 ECR URI 로 교체.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: localroot
      MYSQL_DATABASE: whiskeynote
    # 호스트 MySQL(3306)과 충돌 방지 — bootRun은 127.0.0.1:3307, compose backend는 mysql:3306
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-plocalroot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: whiskeynote-backend:local
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 로컬 compose 전용: 스키마 자동 생성 (EC2/RDS 는 .env 에 넣지 말 것)
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: whiskeynote-frontend:local
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
