name: Deploy (ECR + EC2)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 495264909330.dkr.ecr.ap-northeast-2.amazonaws.com
  BACKEND_IMAGE: team7/whiskeynote-backend
  FRONTEND_IMAGE: team7/whiskeynote-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.ec2.yml
          target: /home/ubuntu/whiskeynote/
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/whiskeynote
            mv -f docker-compose.ec2.yml docker-compose.yml
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 495264909330.dkr.ecr.ap-northeast-2.amazonaws.com
            docker compose pull
            docker compose up -d
            docker compose ps
            echo "==> Smoke test (wait up to 60s)"
            smoke_ok=0
            for _ in $(seq 1 12); do
              # (1) Frontend 응답 확인 (nginx)
              curl -fsS http://localhost/ >/dev/null || true

              # (2) Backend health 확인 (컨테이너 네트워크로 확인; 호스트 8080 publish 불필요)
              backend_cid="$(docker compose ps -q backend)"
              if [ -n "$backend_cid" ] && docker run --rm --network "container:${backend_cid}" curlimages/curl:latest -fsS http://localhost:8080/actuator/health >/dev/null; then
                smoke_ok=1
                break
              fi
              sleep 5
            done
            if [ "$smoke_ok" -ne 1 ]; then
              echo "Smoke test failed"
              exit 1
            fi
