spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
  jpa:
    # Flyway 사용 시 true면 entityManagerFactory ↔ flyway 순환 의존 발생 (Spring Boot 4)
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  sql:
    init:
      mode: never

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:team7-whiskeynote-images}

# OAuth — 루트 .env의 OAUTH_* 변수 바인딩 (OauthProperties)
# EC2: .env 수정 후 docker compose up -d
oauth:
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:}
  kakao:
    client-id: ${OAUTH_KAKAO_CLIENT_ID:}
    client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:}
  naver:
    client-id: ${OAUTH_NAVER_CLIENT_ID:}
    client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
    redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:}
