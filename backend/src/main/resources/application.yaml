# =====================================================
# [공통 설정 파일] application.yaml
# - GitHub에 올라가는 파일입니다.
# - DB 비밀번호, API 키 등 민감한 정보는 절대 여기에 작성하지 마세요.
# - 민감 정보는 application-local.yaml 에 작성하세요. (gitignore 처리됨)
# =====================================================

spring:
  application:
    name: whiskeynote  # 애플리케이션 이름

  # --------------------------------------------------
  # 프로필 설정
  # - 로컬 개발 시: active 값을 'local' 로 유지
  # - 서버 배포 시: 환경변수로 주입 (예: SPRING_PROFILES_ACTIVE=prod)
  # --------------------------------------------------
  profiles:
    active: local  # 기본 활성 프로필

  # --------------------------------------------------
  # JPA / Hibernate 공통 설정
  # --------------------------------------------------
  jpa:
    defer-datasource-initialization: true # 애플리케이션 시작 시 데이터베이스 초기화 지연 (스키마 생성 후 데이터 삽입)
    hibernate:
      ddl-auto: update        # 엔티티 변경 시 테이블 자동 반영 (운영에서는 반드시 'none' 또는 'validate' 로 변경)
    show-sql: true            # 실행되는 SQL 콘솔 출력 여부 (운영에서는 false 권장)
    properties:
      hibernate:
        format_sql: true      # SQL 가독성 좋게 포맷팅

# --------------------------------------------------
# 서버 포트
# --------------------------------------------------
server:
  port: 8080

# 헬스체크 — 배포·Docker healthcheck·RDS 스키마 오류(기동 실패) 확인용
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

# --------------------------------------------------
# JWT 설정 (민감 정보는 application-local.yaml에서 오버라이드)
# --------------------------------------------------
jwt:
  secret: "change-this-in-local-yaml-must-be-at-least-32-characters-long"
  access-token-expiry-ms: 1800000    # 30분
  refresh-token-expiry-ms: 1209600000 # 14일

# S3 이미지 (EC2 IAM Role / 로컬은 aws configure 또는 비활성)
aws:
  s3:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET:}
    presign-duration-minutes: 10
    max-size-bytes: 5242880  # 5MB
