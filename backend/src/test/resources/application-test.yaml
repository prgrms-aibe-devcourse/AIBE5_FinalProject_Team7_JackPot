# =====================================================
# [테스트 전용 설정] application-test.yaml
# - @ActiveProfiles("test") 로 활성화
# - H2 인메모리 DB 사용 → MySQL 없이 테스트 가능
# - 테스트 종료 시 DB 자동 소멸
# =====================================================

spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop   # 테스트 시작 시 테이블 생성, 종료 시 삭제
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true  # JPA 테이블 생성 후 data.sql 실행

  sql:
    init:
      mode: never   # 테스트 환경에서는 data.sql 실행 안 함

  autoconfigure:
    exclude:
      - org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchAutoConfiguration
      - org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchReactiveRepositoriesAutoConfiguration

  h2:
    console:
      enabled: false

jwt:
  secret: "test-secret-key-must-be-at-least-32-characters-long!!"
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 1209600000

aws:
  s3:
    region: ap-northeast-2
    bucket: test-bucket
    presign-duration-minutes: 10
    max-size-bytes: 5242880

anthropic:
  api-key: "${ANTHROPIC_API_KEY:}"  # 로컬 테스트 시 환경변수로 주입. 없으면 빈 값 → AI-06~08 스킵

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost/test/oauth/google/callback
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    redirect-uri: http://localhost/test/oauth/kakao/callback
  naver:
    client-id: test-naver-client-id
    client-secret: test-naver-client-secret
    redirect-uri: http://localhost/test/oauth/naver/callback
